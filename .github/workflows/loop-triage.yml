name: loop-triage

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: .
        run: pip install pyyaml pytest

      - name: Run loop triage
        working-directory: .
        run: python scripts/loop_triage.py

      - name: Upload queue artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop-queue
          path: .loop/state/queue.json
